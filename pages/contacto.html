<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/styles.css" />

    <title>Contacto - RAÍZ</title>
  </head>
  <body>
    <header>
      <div class="div-logo">
        <a class="logo" href="../index.html">RAÍZ</a>
      </div>

      <nav class="header-nav">
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h1 class="titulo-contacto text-secondary">Contacte con nosotros</h1>

      <form
        class="form-contacto"
        action="https://formspree.io/f/xjglqaav"
        method="POST"
      >
        <div class="grupo-input">
          <label>
            Correo electrónico:
            <input type="email" name="email" required />
          </label>
        </div>
        <div class="grupo-input">
          <label>
            Dejanos un mensaje:
            <textarea name="message" required></textarea>
          </label>
        </div>
        <button class="btn bg-secondary text-dark" type="submit">Enviar</button>
      </form>
    </main>
    <footer>
      <p>© 2026 - Sitio realizado para Talento Tech - por Betu</p>
      <nav>
        <ul class="footer-list">
          <li><img src="../img/whatsapp.png" alt="logo-whatsapp" /></li>
          <li><img src="../img/instagram.png" alt="logo-instagram" /></li>
          <li><img src="../img/facebook.png" alt="logo-facebook" /></li>
        </ul>
      </nav>
    </footer>
    <script type="module" src="../js/contacto.js"></script>
  </body>
</html>
